<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart - Mini E-commerce AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { padding-top: 56px; background:#f8faf8; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Mini E-commerce AI</a>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="#">Cart</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h2>Your Shopping Cart</h2>
  <table class="table table-bordered" id="cartTable">
    <thead class="table-success">
      <tr><th>Product</th><th>Price</th><th>Quantity</th><th>Total</th><th>Action</th></tr>
    </thead>
    <tbody></tbody>
  </table>
  <h4 class="text-end">Grand Total: $<span id="grandTotal">0</span></h4>
  <div class="text-end mt-3">
  <button class="btn btn-primary" onclick="checkout()">Proceed to Checkout</button>
</div>
</div>
 


<script>
let token = localStorage.getItem('token');
if(!token){
  alert("Please login first!");
  window.location.href = "login.html";
}

let cart = [];

// Fetch cart from API
function fetchCart() {
  fetch('http://127.0.0.1:8000/api/cart', {
    headers: { 'Authorization': `Bearer ${token}` }
  })
  .then(res => res.json())
  .then(data => {
    cart = data || [];
    renderCart();
  })
  .catch(err => console.error("Failed to load cart:", err));
}

// Render cart table
function renderCart() {
  const tbody = document.querySelector("#cartTable tbody");
  const grandTotalEl = document.getElementById("grandTotal");
  tbody.innerHTML = "";
  let grandTotal = 0;

  cart.forEach(item => {
    let total = item.product.price * item.quantity;
    grandTotal += total;

    tbody.innerHTML += `
      <tr>
        <td>${item.product.name}</td>
        <td>$${item.product.price}</td>
        <td>
          <input type="number" min="1" value="${item.quantity}" onchange="updateQuantity(${item.id}, this.value)">
        </td>
        <td>$${total}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="removeItem(${item.id})">Remove</button>
        </td>
      </tr>
    `;
  });

  grandTotalEl.textContent = grandTotal.toFixed(2);
}

// Update quantity
function updateQuantity(cartId, qty){
  qty = Math.max(1, parseInt(qty));
  fetch(`http://127.0.0.1:8000/api/cart/${cartId}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    },
    body: JSON.stringify({ quantity: qty })
  })
  .then(res => res.json())
  .then(data => {
    if(data.success === false && data.message === "Not enough stock") {
      alert("Cannot set quantity: Not enough stock!");
      fetchCart(); // Re-display the card at the old value
    } else {
      fetchCart(); // Update the card normally
    }
  })
  .catch(err => console.error(err));
}


// Remove item
function removeItem(cartId){
  fetch(`http://127.0.0.1:8000/api/cart/${cartId}`, {
    method: 'DELETE',
    headers: { 'Authorization': `Bearer ${token}` }
  })
  .then(() => fetchCart())
  .catch(err => console.error(err));
}
function checkout(){
  if(cart.length === 0){
    alert("Your cart is empty!");
    return;
  }
  window.location.href = "payment.html";
}

// Initial fetch
fetchCart();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
