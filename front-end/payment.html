<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment - Mini E-commerce AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { padding-top: 56px; background:#f8faf8; }
.payment-container { max-width:500px; margin:60px auto; padding:20px; background:#fff; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Mini E-commerce AI</a>
    
  </div>
</nav>

<div class="payment-container">
  <h3 class="mb-4 text-center">Payment Details</h3>
  <form id="paymentForm">
    <div class="mb-3">
      <label>Full Name</label>
      <input type="text" class="form-control" required>
    </div>
    <div class="mb-3">
      <label>Card Number</label>
      <input type="text" class="form-control" maxlength="16" required>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Expiry Date</label>
        <input type="month" class="form-control" required>
      </div>
      <div class="col-md-6 mb-3">
        <label>CVV</label>
        <input type="password" class="form-control" maxlength="4" required>
      </div>
    </div>
    <button type="submit" class="btn btn-success w-100">Pay Now</button>
  </form>
</div>

<script>
 document.getElementById("paymentForm").addEventListener("submit", function(e){
    e.preventDefault();

    const token = localStorage.getItem("token");
    if(!token){
        alert("You must be logged in to checkout!");
        return;
    }

    fetch("http://localhost:8000/api/checkout", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({})
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){
            alert(data.message);

            localStorage.removeItem("cart"); // مسح الكارت من frontend
            window.location.href = `order-details.html?order_id=${data.order.id}`;
        } else {
            alert(data.message || data.error);
        }
    })
    .catch(err => console.error(err));
});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
