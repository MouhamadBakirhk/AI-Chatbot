<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add / Update Product</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { padding-top: 56px; background-color:#f8f9fa; }
.form-container { max-width: 600px; margin: 20px auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Mini E-commerce AI</a>
  </div>
</nav>

<div class="container mt-4">
  <div class="form-container">
    <h2 class="mb-4">Add / Update Product</h2>
    <form id="productForm">
      <div class="mb-3">
        <label>Product Name</label>
        <input type="text" id="name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label>Description</label>
        <textarea id="description" class="form-control" rows="3" required></textarea>
      </div>
      <div class="mb-3">
        <label>Category</label>
        <select id="category" class="form-select" required>
          <option value="Electronics">Electronics</option>
          <option value="Clothes">Clothes</option>
          <option value="Accessories">Accessories</option>
          <option value="Books">Books</option>
        </select>
      </div>
      <div class="mb-3">
        <label>Price ($)</label>
        <input type="number" id="price" class="form-control" step="0.01" required>
      </div>
      <div class="mb-3">
        <label>Quantity</label>
        <input type="number" id="quantity" class="form-control" required>
      </div>
      <div class="mb-3">
        <label>Product Image</label>
        <input type="file" id="image" class="form-control" accept="image/*" required>
      </div>
      <button type="submit" class="btn btn-success w-100">Add Product</button>
    </form>
  </div>

  <div class="mt-5">
    <h2>Existing Products</h2>
    <table class="table table-bordered" id="productsTable">
      <thead class="table-dark">
        <tr>
          <th>Name</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Add/Update Product Form + Load Products + Update Quantity -->
<script>
const currentUser = JSON.parse(localStorage.getItem('user'));
const currentToken = localStorage.getItem('token');

if (!currentToken || !currentUser || currentUser.role !== 'admin') {
    alert("Access denied! Admins only.");
    window.location.href = "login.html";
}

// --- Add Product ---
document.getElementById('productForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData();
    formData.append("name", document.getElementById("name").value);
    formData.append("description", document.getElementById("description").value);
    formData.append("category", document.getElementById("category").value);
    formData.append("price", parseFloat(document.getElementById("price").value));
    formData.append("quantity", parseInt(document.getElementById("quantity").value));
    formData.append("image", document.getElementById("image").files[0]);

    console.log("Submitting product with token:", currentToken);

    try {
        const res = await fetch('http://127.0.0.1:8000/api/products', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + currentToken },
            body: formData
        });
        const data = await res.json();
        console.log("Add product response:", data);
        if (data.success) {
            alert("Product added successfully!");
            document.getElementById('productForm').reset();
            loadProducts();
        } else alert(data.message || "Failed to add product!");
    } catch(err) {
        console.error("Add product error:", err);
        alert("Server error! Check console.");
    }
});

 
// --- Load Products ---
async function loadProducts() {
    try {
        const res = await fetch('http://127.0.0.1:8000/api/products', {
            headers: { 'Authorization': 'Bearer ' + currentToken }
        });
        const products = await res.json();
        console.log("Products loaded:", products);

        const tbody = document.querySelector("#productsTable tbody");
        tbody.innerHTML = "";

        products.forEach(p => {
            tbody.innerHTML += `
                <tr>
                    <td>${p.name}</td>
                    <td>$${p.price}</td>
                    <td><input type="number" value="${p.quantity}" id="qty-${p.id}"></td>
                    <td>
                        <button class="btn btn-primary btn-sm"
                            onclick="updateProductQty(${p.id}, document.getElementById('qty-${p.id}').value)">
                            Update
                        </button>
                    </td>
                </tr>
            `;
        });

    } catch(err) {
        console.error("Load products error:", err);
    }
}

// --- Update Product Quantity ---
async function updateProductQty(productId, newQty) {
    const token = localStorage.getItem('token');
    newQty = parseInt(newQty); // تحويل القيمة لرقم صحيح
    console.log(`Updating product ID: ${productId} New quantity: ${newQty}`);
    console.log(`Token: ${token}`);

    try {
        const response = await fetch(`http://127.0.0.1:8000/api/products/${productId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ quantity: newQty })
        });

        let data;
        try {
            data = await response.json(); // نجرب parse JSON
        } catch (err) {
            console.error('Server returned invalid JSON');
            const text = await response.text();
            console.log('Raw response text:', text);
            data = { success: false, message: 'Invalid JSON from server' };
        }

        console.log('Update response:', data);

        if (!response.ok) {
            alert(`Error ${response.status}: ${data.message}`);
        } else if (data.success) {
            alert('Quantity updated successfully!');
            loadProducts(); // تحديث الجدول بعد التعديل
        }

    } catch (err) {
        console.error('Network or fetch error:', err);
        alert('Network error. Check console for details.');
    }
}

// Initial load
loadProducts();


 
</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
