<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Mini E-commerce</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#f8f9fa; }
.login-container { max-width:400px; margin:80px auto; padding:20px; background:#fff; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<div class="login-container">
  <h2 class="text-center mb-4">Login</h2>
  <form id="loginForm">
    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control" id="email" required>
    </div>
    <div class="mb-3">
      <label>Password</label>
      <input type="password" class="form-control" id="password" required>
    </div>
    <button type="submit" class="btn btn-success w-100">Login</button>
    <p class="mt-3 text-center">Don't have an account? <a href="register.html">Register here</a></p>
  </form>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const res = await fetch('http://127.0.0.1:8000/api/login', {
            method: 'POST',
            headers: { 'Content-Type':'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if(data.access_token) {
             
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('user', JSON.stringify(data.user || {}));
            localStorage.setItem('role', data.user.role || '');

            alert("Login successful!");

            
            if(data.user.role === 'admin') {
                window.location.href = "add-product.html";
            } else {
                window.location.href = "index.html";
            }
        } else {
            alert(data.message || "Invalid credentials!");
        }
    } catch(err) {
        console.error("Login error:", err);
        alert("Server error! Check console.");
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
