<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Mini E-commerce</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#f8f9fa; }
.register-container { max-width:400px; margin:80px auto; padding:20px; background:#fff; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
</style>
</head>
<body>
<div class="register-container">
  <h2 class="text-center mb-4">Register</h2>
  <form id="registerForm">
    <div class="mb-3"><label>Full Name</label><input type="text" class="form-control" id="name" required></div>
    <div class="mb-3"><label>Email address</label><input type="email" class="form-control" id="email" required></div>
    <div class="mb-3"><label>Password</label><input type="password" class="form-control" id="password" required></div>
    <div class="mb-3"><label>Confirm Password</label><input type="password" class="form-control" id="confirmPassword" required></div>
    <button type="submit" class="btn btn-success w-100">Register</button>
    <p class="mt-3 text-center">Already have an account? <a href="login.html">Login here</a></p>
  </form>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit", function(e){
  e.preventDefault();
  
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if(password !== confirmPassword){
    alert("Passwords do not match!");
    return;
  }

  fetch('http://127.0.0.1:8000/api/register', {
    method: 'POST',
    headers: { 'Content-Type':'application/json' },
    body: JSON.stringify({ name, email, password })
  })
  .then(res => res.json())
  .then(data => {
      console.log(data); 
      
      if(!data.error){  
          alert("Registration successful! Please login.");
          window.location.href = "login.html";
      } else {
          alert(data.message || "Registration failed!");
      }
  })
  .catch(err => console.error(err));
});


</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
